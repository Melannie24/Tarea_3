<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensaje descifrado</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Courier New', monospace;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }
  .icon { font-size: 32px; margin-bottom: 16px; }
  .label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #555; margin-bottom: 6px; }
  .etiqueta { font-size: 12px; color: #6a9fb5; letter-spacing: 1px; margin-bottom: 28px; }
  .card {
    background: #16213e;
    border: 1px solid #a8d8a8;
    border-radius: 6px;
    padding: 28px 32px;
    max-width: 480px;
    width: 100%;
    margin-bottom: 24px;
  }
  .card p {
    font-size: 15px;
    line-height: 1.8;
    color: #e0e0e0;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .warning {
    font-size: 10px;
    color: #5a4a1a;
    margin-bottom: 24px;
    text-align: center;
    letter-spacing: 1px;
  }
  .warning span { color: #8a7030; }
  a {
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: #6a9fb5; text-decoration: none;
    border-bottom: 1px solid transparent; transition: border-color 0.2s;
  }
  a:hover { border-color: #6a9fb5; }
</style>
</head>
<body>
  <div class="icon">&#128275;</div>
  <p class="label">mensaje descifrado</p>
  <p class="etiqueta">{{ etiqueta }}</p>

  <div class="card">
    <p>{{ texto }}</p>
  </div>

  <p class="warning"><span>&#9651;</span> este token ha sido marcado como leído y ya no puede usarse.</p>
  <a href="/descifrar">&#8592; descifrar otro</a>
</body>
</html>
